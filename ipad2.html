/* ====== 基础 ====== */

body{background:#0A0A0A;color:#EEE;font-family:-apple-system,'Helvetica Neue',sans-serif;

/* ====== 深色配色（硬编码，无 CSS 变量） ====== */

.day-content{height:100vh;display:table;width:100%;table-layout:fixed}
.day-content-inner{display:table-cell;vertical-align:top;padding:4px 6px}

/* ====== 顶部栏（横屏：weather | HH | MM | SS | theme）====== */
.top-bar{width:100%;margin-bottom:2px}
.top-row{width:100%;display:table;table-layout:fixed}
.top-row>div{display:table-cell;vertical-align:middle;text-align:center;padding:4px 2px}

/* 天气栏 */
.weather-col .w-icon{font-size:40px;line-height:1}
.weather-col .w-temp{font-size:42px;font-weight:900;color:#FFF;line-height:1.1}
.weather-col .w-hl{font-size:14px;color:#888;font-weight:700;margin-top:2px}
.weather-col .w-detail{font-size:13px;color:#666;margin-top:2px}

/* 时间栏 */
.time-col .t-num{font-size:110px;font-weight:900;color:#FFF;line-height:1;font-variant-numeric:tabular-nums}
.time-col .t-label{font-size:14px;color:#888;font-weight:700;text-transform:uppercase;letter-spacing:2px}

/* 主题栏 */

.main-table{width:100%;display:table;table-layout:fixed}
.main-table>div{display:table-cell;vertical-align:top}

.sched-col .sec-title{font-size:20px;font-weight:900;color:#4ADE80;margin-bottom:6px}

.sched-row{display:table;width:100%;padding:4px 6px;border-bottom:1px solid #1A1A1A;border-radius:6px}
.sched-row.cur{background:#0A4A1A;border-bottom-color:#4ADE80;box-shadow:inset 3px 0 0 #4ADE80;padding:8px 8px;margin:1px -2px;border-radius:10px}

.sched-row.cur .sched-time{font-size:28px;color:#FF8888}

.sched-desc{display:table-cell;font-size:18px;color:#EEE;vertical-align:middle;padding-left:8px;font-weight:700}

<script>
// ========== 天气数据 ==========
var weatherCache = { max: 30, min: 20, now: null, code: 0, rain: 0, desc: "晴" };

var WCODE = {
  0:"☀️",1:"🌤",2:"⛅",3:"☁️",45:"🌫",48:"🌫",
  51:"🌦",53:"🌦",55:"🌧",61:"🌧",63:"🌧",65:"🌧",
  71:"🌨",73:"🌨",75:"🌨",80:"🌧",81:"🌧",82:"⛈",
  95:"⛈",96:"⛈",99:"⛈"
};
var WDESC = {
  0:"晴",1:"少云",2:"多云",3:"阴",45:"雾",48:"霜雾",
  51:"小雨",53:"小雨",55:"中雨",61:"阵雨",63:"中雨",65:"大雨",
  71:"小雪",73:"中雪",75:"大雪",80:"阵雨",81:"中雨",82:"暴雨",
  95:"雷暴",96:"雷暴冰雹",99:"强雷暴"
};

function pad2(n) { return (n < 10 ? "0" : "") + n; }
function fmtTemp(v) { return (v !== null && v !== undefined) ? v.toFixed(1) : "--"; }

function fetchWeather() {
  var xhr = new XMLHttpRequest();
  var d = new Date();
  var ds = d.getFullYear() + "-" + pad2(d.getMonth()+1) + "-" + pad2(d.getDate());
  var url = "https://api.open-meteo.com/v1/forecast?latitude=31.878&longitude=117.265" +
    "&daily=temperature_2m_max,temperature_2m_min,weathercode,precipitation_probability_max" +
    "&current_weather=true&timezone=Asia/Shanghai&start_date=" + ds + "&end_date=" + ds;

  xhr.open("GET", url, true);
  xhr.onload = function() {
    if (xhr.status === 200) {
      try {
        var data = JSON.parse(xhr.responseText);
        var dw = data.daily;
        var cw = data.current_weather || {};
        weatherCache.max = dw.temperature_2m_max[0];
        weatherCache.min = dw.temperature_2m_min[0];
        weatherCache.code = dw.weathercode[0];
        weatherCache.rain = dw.precipitation_probability_max[0] || 0;
        weatherCache.now = (cw.temperature !== undefined) ? cw.temperature : null;
        weatherCache.desc = WDESC[weatherCache.code] || "晴";
      } catch(e) {}
    }
    updateWeatherDisplay();
    updateNightScreen();
  };
  xhr.onerror = function() { updateWeatherDisplay(); };
  xhr.send();
}

function updateWeatherDisplay() {
  var w = weatherCache;
  var icon = WCODE[w.code] || "☀️";
  var nowStr = fmtTemp(w.now);

  // 横屏
  var elIcon = document.getElementById("wIcon");
  var elTemp = document.getElementById("wTemp");
  var elHL = document.getElementById("wHL");
  var elDetail = document.getElementById("wDetail");
  if (elIcon) elIcon.textContent = icon;
  if (elTemp) elTemp.textContent = nowStr + "°";
  if (elHL) elHL.textContent = fmtTemp(w.max) + "° / " + fmtTemp(w.min) + "°";
  if (elDetail) elDetail.textContent = w.desc + " · 💧" + w.rain + "%";

  // 竖屏
  var elVW = document.getElementById("vertWeather");
  if (elVW) elVW.textContent = icon + " " + nowStr + "°  " + fmtTemp(w.max) + "°/" + fmtTemp(w.min) + "°  " + w.desc + " 💧" + w.rain + "%";
}

function updateNightScreen() {
  var nt = document.getElementById("nightTime");
  if (!nt) return;
  var d = new Date();
  nt.textContent = pad2(d.getHours()) + ":" + pad2(d.getMinutes());

  var w = weatherCache;
  var elTemp = document.getElementById("nightTemp");
  var elLabel = document.getElementById("nightLabel");
  if (elTemp) elTemp.textContent = fmtTemp(w.now) + "°";
  if (elLabel) elLabel.textContent = w.desc;
}

// ========== 渲染函数 ==========
function findCurrent(nowHour, nowMin) {
  var nowTotal = nowHour * 60 + nowMin;
  var idx = schedule.length - 1;
  for (var i = schedule.length - 1; i >= 0; i--) {
    if (nowTotal >= schedule[i].range[0] * 60 + schedule[i].range[1]) { idx = i; break; }
  }
  return idx;
}

function renderSchedule(nowHour, nowMin, targetId) {
  var el = document.getElementById(targetId);
  if (!el) return;
  var cur = findCurrent(nowHour, nowMin);
  var html = "";
  for (var i = 0; i < schedule.length; i++) {
    var s = schedule[i];
    var tm = TAG_MAP[s.type] || ["📌",""];
    var cls = (i === cur) ? " sched-row cur" : " sched-row";
    html += "<div class=\"" + cls + "\">";
    html += "<div class=\"sched-time\">" + s.time + "</div>";
    html += "<div class=\"sched-tag tag-" + s.type + "\">" + tm[0] + "</div>";
    html += "<div class=\"sched-desc\">" + s.task + "</div>";
    html += "</div>";
  }
  el.innerHTML = html;
}

function renderEdu(dow, targetId) {
  var el = document.getElementById(targetId);
  if (!el) return;
  var data = eduData[dow % 7];
  var html = "";
  for (var i = 0; i < data.activities.length; i++) {
    var a = data.activities[i];
    html += "<div class=\"edu-card\">";
    html += "<div class=\"e-time\">" + a.label + "</div>";
    html += "<div class=\"e-title\">" + a.text.substring(0, a.text.indexOf("·") > 0 ? a.text.indexOf("·") : a.text.length) + "</div>";
    html += "<div class=\"e-detail\">" + a.text + "</div>";
    html += "</div>";
  }
  el.innerHTML = html;
}

function updateMarquee(nowHour, nowMin) {
  var el = document.getElementById("marqueeText");
  if (!el) return;
  var cur = findCurrent(nowHour, nowMin);
  var s = schedule[cur];
  var tm = TAG_MAP[s.type] || ["📌",""];
  el.textContent = "⏰ 现在是 " + s.time + " " + tm[0] + " " + s.task + " —— 下一个：" + (cur < schedule.length - 1 ? schedule[cur + 1].time + " " + schedule[cur + 1].task : "新的一天开始啦！");
}

// ========== 语音提醒 ==========
var remindLastDate = "";
var remindFired = {};

function speakChinese(text, times, interval) {
  try {
    if (!window.speechSynthesis) return;
    function say(remaining) {
      if (remaining <= 0) return;
      var u = new SpeechSynthesisUtterance(text);
      u.lang = "zh-CN";
      u.rate = 0.85;
      u.pitch = 1.1;
      u.volume = 1;
      u.onend = function() { setTimeout(function(){ say(remaining - 1); }, interval); };
      speechSynthesis.speak(u);
    }
    say(times);
  } catch(e) { /* 不支持 TTS，静默跳过 */ }
}

function checkReminders() {
  var n = new Date();
  var h = n.getHours(), m = n.getMinutes(), s = n.getSeconds();
  var today = n.getFullYear() + "-" + pad2(n.getMonth()+1) + "-" + pad2(n.getDate());
  if (today !== remindLastDate) { remindFired = {}; remindLastDate = today; }

  var reminders = [
    { at: [6,55],  text: "一苇、二杭 喝奶了",  tag: "milk1" },
    { at: [8,20],  text: "一苇、二杭 吃饭了",  tag: "bfast" },
    { at: [11,40], text: "一苇、二杭 吃饭了",  tag: "lunch" },
    { at: [12,50], text: "一苇、二杭 睡觉了",  tag: "nap" },
    { at: [15,25], text: "一苇、二杭 喝奶了",  tag: "milk2" },
    { at: [18,10], text: "一苇、二杭 吃饭了",  tag: "dinner" },
    { at: [20,55], text: "一苇、二杭 喝奶了",  tag: "milk3" },
    { at: [21,20], text: "一苇、二杭 睡觉了",  tag: "sleep" }
  ];

  for (var i = 0; i < reminders.length; i++) {
    var r = reminders[i];
    if (h === r.at[0] && m === r.at[1] && s >= 0 && s < 10 && !remindFired[r.tag]) {
      remindFired[r.tag] = true;
      speakChinese(r.text, 3, 6000);
    }
  }
}

// ========== 主更新 ==========
function update() {
  var now = new Date();
  var h = now.getHours();
  var m = now.getMinutes();
  var s = now.getSeconds();
  var dow = now.getDay();
  var md = now.getMonth() + 1;
  var dd = now.getDate();
  var weekNames = ["日","一","二","三","四","五","六"];

  checkNightMode();

  // 夜间
  if (h >= 22 || h < 6) {
    updateNightScreen();
    return;
  }

  // 横屏时钟
  var elHh = document.getElementById("hh");
  var elMm = document.getElementById("mm");
  var elSs = document.getElementById("ss");
  if (elHh) elHh.textContent = pad2(h);
  if (elMm) elMm.textContent = pad2(m);
  if (elSs) elSs.textContent = pad2(s);

  // 竖屏时钟
  var elVc = document.getElementById("vertClock");
  if (elVc) elVc.textContent = pad2(h) + ":" + pad2(m) + ":" + pad2(s);
  var elVd = document.getElementById("vertDate");
  if (elVd) elVd.textContent = now.getFullYear() + "年" + md + "月" + dd + "日";
  var elVw = document.getElementById("vertWeek");
  if (elVw) elVw.textContent = "周" + weekNames[dow];

  // 渲染（每30秒渲染一次以节省性能）
  if (!update._lastRenderMin || update._lastRenderMin !== m) {
    update._lastRenderMin = m;
    renderSchedule(h, m, "schedWide");
    renderSchedule(h, m, "schedVert");
    renderEdu(dow, "eduWide");
    renderEdu(dow, "eduVert");
    updateMarquee(h, m);

    // 主题
    var themeData = eduData[dow % 7];
    document.getElementById("tName") && (document.getElementById("tName").textContent = themeData.title);
    document.getElementById("tTip") && (document.getElementById("tTip").textContent = themeData.ability);
    document.getElementById("vtName") && (document.getElementById("vtName").textContent = themeData.title);
    document.getElementById("vtTip") && (document.getElementById("vtTip").textContent = themeData.ability);
  }

  updateNightScreen();
}

// ========== 初始化 ==========
checkNightMode();
update();
fetchWeather();

setInterval(function() { update(); checkReminders(); }, 1000);
setInterval(fetchWeather, 600000);

// iOS Safari 语音解锁：首次触摸页面时激活 speechSynthesis
document.addEventListener("touchstart", function iosUnlock() {
  try {
    var u = new SpeechSynthesisUtterance("");
    u.volume = 0; u.lang = "zh-CN";
    speechSynthesis.speak(u);
  } catch(e) {}
  document.removeEventListener("touchstart", iosUnlock);
}, { once: true });
</script>
