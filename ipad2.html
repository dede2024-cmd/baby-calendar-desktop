</head><body>

<script>
// ========== 天气数据 ==========
var weatherCache = { max: 30, min: 20, now: 25, code: 0, rain: 0 };

var WCODE = {
  0:"☀️",1:"🌤",2:"⛅",3:"☁️",45:"🌫",48:"🌫",
  51:"🌦",53:"🌦",55:"🌧",61:"🌧",63:"🌧",65:"🌧",
  71:"🌨",73:"🌨",75:"🌨",80:"🌧",81:"🌧",82:"⛈",
  95:"⛈",96:"⛈",99:"⛈"
};
var WDESC = {
  0:"晴",1:"少云",2:"多云",3:"阴",45:"雾",48:"霜雾",
  51:"小雨",53:"小雨",55:"中雨",61:"阵雨",63:"中雨",65:"大雨",
  71:"小雪",73:"中雪",75:"大雪",80:"阵雨",81:"中雨",82:"暴雨",
  95:"雷暴",96:"雷暴冰雹",99:"强雷暴"
};

// 天气码转文字（低温牌）
function weatherText(code) {
  return WDESC[code] || "晴";
}

// XMLHttpRequest 获取天气
function fetchWeather() {
  var xhr = new XMLHttpRequest();
  var d = new Date();
  var ds = d.getFullYear() + "-" + pad2(d.getMonth()+1) + "-" + pad2(d.getDate());
  var url = "https://api.open-meteo.com/v1/forecast?latitude=31.878&longitude=117.265" +
    "&daily=temperature_2m_max,temperature_2m_min,weathercode,precipitation_probability_max" +
    "&current_weather=true&timezone=Asia/Shanghai&start_date=" + ds + "&end_date=" + ds;

  xhr.open("GET", url, true);
  xhr.onload = function() {
    if (xhr.status === 200) {
      try {
        var data = JSON.parse(xhr.responseText);
        var dw = data.daily;
        var cw = data.current_weather || {};
        weatherCache.max = Math.round(dw.temperature_2m_max[0]);
        weatherCache.min = Math.round(dw.temperature_2m_min[0]);
        weatherCache.code = dw.weathercode[0];
        weatherCache.rain = dw.precipitation_probability_max[0] || 0;
        weatherCache.now = (cw.temperature !== undefined) ? Math.round(cw.temperature) : null;
      } catch(e) {}
    }
    updateWeatherDisplay();
    updateNightScreen();
  };
  xhr.onerror = function() {
    updateWeatherDisplay();
  };
  xhr.send();
}

function pad2(n) {
  return (n < 10 ? "0" : "") + n;
}

function updateWeatherDisplay() {
  var w = weatherCache;
  var icon = WCODE[w.code] || "☀️";
  var desc = weatherText(w.code);
  var nowStr = (w.now !== null && w.now !== undefined) ? w.now + "°" : "";

  // 顶部天气
  var elNow = document.getElementById("wNow");
  var elHL = document.getElementById("wHL");
  if (elNow) elNow.textContent = icon + " " + nowStr;
  if (elHL) elHL.textContent = w.max + "° / " + w.min + "°";

  // 底部天气条
  var elBar = document.getElementById("weatherBar");
  if (elBar) elBar.textContent = icon + " " + desc + " · 💧" + w.rain + "% · 合肥庐阳";
}

function updateNightScreen() {
  var d = new Date();
  var h = d.getHours();
  var m = d.getMinutes();
  document.getElementById("nightTime").textContent = pad2(h) + ":" + pad2(m);

  var w = weatherCache;
  var t = (w.now !== null && w.now !== undefined) ? w.now : Math.round((w.max + w.min) / 2);
  document.getElementById("nightTemp").textContent = t + "°";
  document.getElementById("nightLabel").textContent = weatherText(w.code);
}

// ========== 夜间模式 ==========
function checkNightMode() {
  var h = new Date().getHours();
  if (h >= 22 || h < 6) {
    document.body.className = "night-mode";
  } else {
    document.body.className = "";
  }
}

// ========== 作息数据 ==========
var schedule = [

  { time: "13:00-15:00", task: "午睡（白天仅一次）· 空调26-28°C", type: "red", range: [13,0] },
  { time: "15:30", task: "喝奶（160-200ml）+ 主题早教（10-15分钟）", type: "purple", range: [15,30] },

// ========== 早教数据 ==========
var eduData = [

      { label: "户外 9:30/16:00", text: "观察路边蚂蚁、小鸟、蝴蝶" },
      { label: "主题早教 15:30", text: "动物卡片配对 · 从2-3张中找出对应动物" },

    ]
  },
  {

    activities: [
      { label: "早晨 8:40", text: "读《从头动到脚》· 一边读一边做动作" },
      { label: "户外 9:30/16:00", text: "边走边玩「指鼻子、指耳朵」游戏" },
      { label: "主题早教 15:30", text: "镜子游戏：站在镜前指认五官" },
      { label: "睡前 21:00", text: "贴贴画：在笑脸轮廓上贴眼睛鼻子嘴巴" }
    ]
  },
  {

// ========== 渲染函数 ==========
function renderSchedule(nowHour, nowMin) {
  var html = "";
  var currentIdx = -1;
  var nowTotal = nowHour * 60 + nowMin;
  for (var i = schedule.length - 1; i >= 0; i--) {
    var t = schedule[i].range;
    var tTotal = t[0] * 60 + t[1];
    if (nowTotal >= tTotal) { currentIdx = i; break; }
  }
  if (currentIdx === -1) currentIdx = 0;

  for (var i = 0; i < schedule.length; i++) {
    var s = schedule[i];
    var tagClass = "tag-" + s.type;
    var tagText = "";
    if (s.type === "red")    tagText = "必须";
    if (s.type === "yellow") tagText = "灵活";
    if (s.type === "green")  tagText = "建议";
    if (s.type === "purple") tagText = "早教";
    var cls = (i === currentIdx) ? " highlight" : "";

    html += "<tr class=\"" + cls + "\">";
    html += "<td class=\"time-cell\">" + s.time + "</td>";
    html += "<td class=\"task-cell\">" + s.task + "</td>";
    html += "<td class=\"type-cell\"><span class=\"" + tagClass + "\">" + tagText + "</span></td>";
    html += "</tr>";
  }
  document.getElementById("scheduleTable").innerHTML = html;
}

function renderNowTask(nowHour, nowMin) {
  var nowTotal = nowHour * 60 + nowMin;
  var task = schedule[schedule.length - 1];
  for (var i = schedule.length - 1; i >= 0; i--) {
    var t = schedule[i].range;
    if (nowTotal >= t[0] * 60 + t[1]) { task = schedule[i]; break; }
  }
  document.getElementById("nowTask").textContent = task.task;
  document.getElementById("nowTip").textContent = "「" + task.time + "」";
}

function renderEdu(d) {
  var data = eduData[d];
  document.getElementById("themeTitle").textContent = data.title;
  document.getElementById("themeAbility").textContent = data.ability;
  var html = "";
  for (var i = 0; i < data.activities.length; i++) {
    var a = data.activities[i];
    html += "<div class=\"act-item\"><span class=\"act-label\">" + a.label + "</span>：" + a.text + "</div>";
  }
  document.getElementById("eduActivities").innerHTML = html;
}

function update() {
  var now = new Date();
  var h = now.getHours();
  var m = now.getMinutes();
  var dow = now.getDay();
  var md = now.getMonth() + 1;
  var dd = now.getDate();
  var weekNames = ["日","一","二","三","四","五","六"];

  // 夜间模式
  checkNightMode();

  // 白天情况下才更新这些
  if (!(h >= 22 || h < 6)) {
    document.getElementById("clock").textContent = pad2(h) + ":" + pad2(m);
    document.getElementById("date").textContent = now.getFullYear() + "年" + md + "月" + dd + "日";
    document.getElementById("weekday").textContent = "周" + weekNames[dow];
    renderNowTask(h, m);
    renderSchedule(h, m);
    renderEdu(dow);
  }

  // 夜间更新时间
  updateNightScreen();
}

// ========== 初始化 ==========
checkNightMode();
update();
fetchWeather();

// 每30秒刷新显示
setInterval(update, 30000);
// 每10分钟刷新天气
setInterval(fetchWeather, 600000);
</script>
