<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="宝宝日历">
<meta name="theme-color" content="#0A0A0A">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='180' height='180'><rect width='180' height='180' rx='36' fill='%23FF6B6B'/><text x='90' y='115' text-anchor='middle' font-size='90'>👶</text></svg>">
<link rel="manifest" href="manifest.json">
<title>宝宝日历</title>
<style>
:root{
  --bg:#0A0A0A;--card:#1A1A1A;--card2:#222;
  --red:#FF4444;--green:#4ADE80;--gold:#FACC15;--blue:#60A5FA;
  --white:#FFFFFF;--gray:#999;--border:#333;
}
/* 白天模式（6:00-22:00）*/
body.day-mode{--bg:#111;--card:#1E1E1E;--card2:#282828;--border:#3A3A3A}
/* 夜间模式（22:00-6:00）*/
body.night-mode{--bg:#020202;--card:#0A0A0A;--card2:#0F0F0F;--border:#1A1A1A;zoom:1}
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:-apple-system,"PingFang SC","Hiragino Sans GB",sans-serif;
  background:var(--bg);color:var(--white);
  padding:0;width:100vw;height:100vh;overflow-y:auto;
  -webkit-font-smoothing:antialiased;user-select:none;
}

/* ═══════════ 夜间模式：只显示温度+时间 ═══════════ */
.night-only{display:none}
body.night-mode .night-only{display:flex}
body.night-mode .day-only{display:none}
body.night-mode .marquee-wrap{display:none}
body.night-mode .signature{display:none}
.night-screen{
  flex-direction:column;align-items:center;justify-content:center;
  width:100vw;height:100vh;
}
.night-temp{
  font-size:min(28vw,28vh,260px);font-weight:900;line-height:1;
  color:#CCC;opacity:0.7;
}
.night-temp .unit{font-size:0.35em;font-weight:700;color:#666}
.night-time{
  font-size:min(22vw,22vh,200px);font-weight:900;line-height:1.1;
  color:#555;margin-top:0.05em;letter-spacing:4px;
}
.night-weather-label{font-size:min(4vw,4vh,36px);color:#444;margin-top:0.8em;font-weight:700}
.night-city{font-size:min(2.5vw,2.5vh,22px);color:#333;margin-top:0.5em;font-weight:600}

/* 顶部超大时间 + 天气 */
.top-bar{
  text-align:center;padding:12px 16px 4px;
  position:sticky;top:0;z-index:10;background:var(--bg);
}
.clock-wrap{display:inline-block}
.clock{font-size:128px;font-weight:900;line-height:1;letter-spacing:4px;font-variant-numeric:tabular-nums}
.clock-sec{font-size:42px;font-weight:700;color:var(--gray);margin-left:4px}
.top-info{display:flex;align-items:center;justify-content:center;gap:14px;padding:6px 0 0}
.top-info .date-str{font-size:22px;font-weight:700;color:var(--gray)}
.top-info .weather-inline{font-size:30px;font-weight:900}
.top-info .weather-detail{font-size:16px;color:var(--gray);font-weight:700}
.top-info .sep{color:var(--border);font-size:16px}

/* 主题条 */
.theme-strip{
  display:flex;align-items:center;gap:10px;
  padding:10px 16px;margin:0 12px 6px;
  border-radius:12px;border:1px solid var(--border);
  background:var(--card);
}
.theme-strip .ts-emoji{font-size:32px}
.theme-strip .ts-label{font-size:16px;color:var(--gold);font-weight:800;letter-spacing:1px}
.theme-strip .ts-name{font-size:26px;font-weight:900;color:var(--white)}
.theme-strip .ts-tip{font-size:16px;color:#999;margin-left:auto;font-weight:600}

/* 板块 */
.section{margin:0 12px 6px;border-radius:14px;padding:10px 16px;background:var(--card);border:1px solid var(--border)}
.section-title{font-size:20px;font-weight:900;margin-bottom:6px;display:flex;align-items:center;gap:8px;color:var(--green)}

/* 作息 */
.schedule-row{display:flex;align-items:center;padding:5px 10px;border-bottom:1px solid var(--border);border-radius:8px;transition:all .3s}
.schedule-row:last-child{border-bottom:none}
.schedule-row.current{background:#0A4A1A;border-bottom-color:var(--green);box-shadow:inset 4px 0 0 var(--green);margin:2px -4px;padding:10px 14px;border-radius:12px}
.schedule-time{font-size:26px;font-weight:900;color:var(--red);min-width:84px}
.schedule-row.current .schedule-time{font-size:36px;font-weight:900}
.schedule-tag{font-size:16px;padding:3px 9px;border-radius:10px;margin-right:10px;font-weight:800}
.schedule-row.current .schedule-tag{font-size:20px;font-weight:900}
.tag-eat{background:#3D1500;color:#FF8C42}
.tag-sleep{background:#001A3D;color:var(--blue)}
.tag-play{background:#002B1A;color:var(--green)}
.tag-learn{background:#1A0033;color:#C084FC}
.tag-care{background:#3D0000;color:#FF6B6B}
.schedule-desc{font-size:22px;color:var(--white);flex:1;font-weight:700}
.schedule-row.current .schedule-desc{font-size:28px;color:var(--green);font-weight:900}

/* 早教 */
.edu-card{background:var(--card2);border:1px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:6px}
.edu-card:last-child{margin-bottom:0}
.edu-card .edu-time{font-size:14px;color:var(--red);font-weight:900;letter-spacing:1px}
.edu-card .edu-title{font-size:20px;font-weight:900;margin:3px 0;color:var(--white)}
.edu-card .edu-detail{font-size:16px;color:#CCC;line-height:1.6;font-weight:600}
.edu-card .edu-mats{font-size:14px;color:var(--gold);margin-top:4px;background:#2A2000;display:inline-block;padding:3px 10px;border-radius:9px;font-weight:800}

/* 加载 */
.loading{font-size:16px;animation:pulse 1.5s infinite;font-weight:700}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* ═══════════ 横屏 5份顶部 + 3栏内容 ═══════════ */
@media (min-width:768px) and (orientation:landscape) {
  body{overflow:hidden}
  
  /* 顶部5栏 */
  .top-bar{
    display:flex;flex-direction:row;align-items:stretch;
    padding:0;margin:0;height:25vh;
    background:var(--bg);
  }
  .top-col{
    flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
    border-right:1px solid #1A1A1A;padding:4px;
  }
  .top-col:last-child{border-right:none}
  
  /* 第1栏 合肥天气 */
  .weather-col .weather-icon{font-size:52px;line-height:1}
  .weather-col .weather-temp{font-size:54px;font-weight:900;line-height:1.1}
  .weather-col .weather-sub{font-size:16px;color:var(--gray);font-weight:700;margin-top:6px}
  
  /* 第2-4栏 时间 HH : MM : SS */
  .time-col .time-num{font-size:150px;font-weight:900;line-height:1;letter-spacing:-2px;font-variant-numeric:tabular-nums}
  .time-col .time-label{font-size:16px;color:var(--gray);font-weight:700;margin-top:2px;text-transform:uppercase;letter-spacing:3px}
  
  /* 第5栏 早教主题 */
  .theme-col .theme-emoji-big{font-size:56px;line-height:1}
  .theme-col .theme-name-big{font-size:32px;font-weight:900;margin-top:6px}
  .theme-col .theme-tip-big{font-size:15px;color:var(--gray);font-weight:600;margin-top:8px;text-align:center;padding:0 8px}
  
  /* 下方三栏 */
  .content-wrap{
    display:grid;grid-template-columns:1fr 1fr 1fr;
    height:calc(75vh - 110px);gap:2px;padding:0 2px 2px;
  }
  .section{margin:0;overflow-y:auto;padding:6px 8px}
  .sched-panel{grid-column:1 / 3;display:flex;flex-direction:column}
  .sched-panel .sched-list{display:grid;grid-template-columns:1fr 1fr;gap:0}
  .sched-panel .sched-list .schedule-row:nth-child(odd){border-right:1px solid var(--border)}
  .sched-panel .sched-list .schedule-row:nth-child(even){border-right:none}
  .edu-panel{grid-column:3}
  
  /* 横屏作息字体 */
  .schedule-row{padding:3px 6px}
  .schedule-time{font-size:22px;min-width:72px}
  .schedule-tag{font-size:14px;padding:2px 7px;margin-right:8px}
  .schedule-desc{font-size:20px}
  .schedule-row.current .schedule-time{font-size:28px;font-weight:900}
  .schedule-row.current .schedule-desc{font-size:24px;font-weight:900}
  .schedule-row.current .schedule-tag{font-size:16px;font-weight:900}
  .schedule-row.current{padding:8px 10px}
  
  /* 横屏早教 */
  .edu-card{padding:8px 12px;margin-bottom:3px}
  .edu-card .edu-title{font-size:20px}
  .edu-card .edu-detail{font-size:16px;line-height:1.4}
  .edu-card .edu-mats{font-size:14px}
  .section-title{font-size:18px}
  
  /* 横屏隐藏竖屏元素 */
  .vert-only{display:none}
}

/* 竖屏保持居中布局 */
@media (min-width:768px) and (orientation:portrait) {
  .content-wrap{display:flex;flex-direction:row;flex-wrap:wrap}
  .sched-panel,.edu-panel{flex:1 1 100%}
}
@media (max-width:767px) {
  /* 手机：顶部时间固定 · 中间作息滚动 · 底部跑马灯固定 */
  body{
    display:flex;flex-direction:column;
    height:100dvh;overflow:hidden;padding:0;
  }
  .top-bar{
    position:static;flex-shrink:0;padding:4px 12px 2px;
  }
  .vert-only .clock{font-size:96px}
  .theme-strip{
    flex-shrink:0;margin:0 6px 2px;padding:6px 10px;
  }
  .content-wrap{
    flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;min-height:0;
    display:flex;flex-direction:column;grid-template-columns:unset;
  }
  .sched-panel{flex:1 1 auto;overflow:visible;grid-column:unset}
  .edu-panel{flex-shrink:0;grid-column:unset}
  .sched-panel .sched-list{display:flex;flex-direction:column}
  .sched-panel .sched-list .schedule-row{border-right:none!important}
  .section{margin:0 6px 3px;padding:6px 10px}
  .section-title{font-size:16px}
  .schedule-time{font-size:22px;min-width:70px}
  .schedule-desc{font-size:18px}
  .schedule-row.current .schedule-time{font-size:28px}
  .schedule-row.current .schedule-desc{font-size:22px}
  .marquee-wrap{
    flex-shrink:0;padding:0 2px 2px;
  }
  .marquee-bar{height:66px;border-radius:10px}
  .marquee-text{font-size:40px}
  .signature{
    position:absolute;bottom:72px;right:12px;
    font-size:11px;opacity:.5;z-index:110;
  }
  .wide-only{display:none}
}

/* 右下角署名 */
.signature{
  position:fixed;bottom:10px;right:16px;
  font-size:15px;color:var(--gray);font-weight:700;
  z-index:100;opacity:.7;letter-spacing:1px;
  pointer-events:none;
}

/* 跑马灯 — 全宽独立条 */
.marquee-wrap{
  width:100%;margin:0;padding:0 4px;
}
.marquee-bar{
  width:100%;height:88px;
  background:var(--green);border-radius:14px;
  overflow:hidden;display:flex;align-items:center;
}
.marquee-text{
  white-space:nowrap;font-size:64px;font-weight:900;color:#FFD700;
  animation:marquee 12s linear infinite;
  padding-left:100%;
  text-shadow:0 3px 6px rgba(0,0,0,.5);
  letter-spacing:4px;
}
@keyframes marquee{
  0%{transform:translateX(0)}
  100%{transform:translateX(-100%)}
}
/* 横屏 */
@media (min-width:768px) and (orientation:landscape) {
  .marquee-bar{height:100px}
  .marquee-text{font-size:80px;animation-duration:15s}
  .signature{bottom:8px;right:14px;font-size:14px}
}

/* 闹铃弹窗 */
.alarm-overlay{
  position:fixed;inset:0;z-index:9999;
  background:rgba(0,0,0,.92);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  animation:alarmPulse 1s infinite;
}
@keyframes alarmPulse{
  0%,100%{background:rgba(0,0,0,.92)}
  50%{background:rgba(60,10,10,.94)}
}
.alarm-emoji{font-size:120px;animation:alarmBounce .3s infinite alternate}
@keyframes alarmBounce{from{transform:scale(1)}to{transform:scale(1.15)}}
.alarm-title{font-size:64px;font-weight:900;color:#FF6B6B;margin:16px 0 8px;text-align:center}
.alarm-sub{font-size:36px;color:#FFB347;font-weight:700;text-align:center}
.alarm-btn{
  margin-top:40px;padding:18px 60px;font-size:28px;font-weight:900;
  background:var(--green);color:#000;border:none;border-radius:20px;cursor:pointer
}
</style>
</head>
<body class="day-mode">

<!-- ════ 夜间模式：只显示温度+时间 ════ -->
<div class="night-only night-screen" id="nightScreen">
  <div class="night-temp" id="nightTemp">--°</div>
  <div class="night-time" id="nightTime">00:00</div>
  <div class="night-weather-label" id="nightWeatherLabel">--</div>
  <div class="night-city">合肥 · 庐阳</div>
</div>

<!-- ════ 横屏顶部 5栏 ════ -->
<div class="top-bar wide-only day-only" id="wideTop">
  <div class="top-col weather-col" id="weatherCol">
    <span class="weather-icon" id="wIcon">☀️</span>
    <span class="weather-temp" id="wTemp">28°</span>
    <span class="weather-sub" id="wSub">合肥 · 晴</span>
  </div>
  <div class="top-col time-col">
    <span class="time-num" id="hh">10</span>
    <span class="time-label">时</span>
  </div>
  <div class="top-col time-col">
    <span class="time-num" id="mm">55</span>
    <span class="time-label">分</span>
  </div>
  <div class="top-col time-col">
    <span class="time-num" id="ss">00</span>
    <span class="time-label">秒</span>
  </div>
  <div class="top-col theme-col" id="themeCol">
    <span class="theme-emoji-big" id="tEmoji">🌈</span>
    <span class="theme-name-big" id="tName">颜色认知</span>
    <span class="theme-tip-big" id="tTip">💡 多指认红色黄色</span>
  </div>
</div>

<!-- ════ 竖屏顶部（居中布局）═══ -->
<div class="top-bar vert-only day-only" id="vertTop">
  <div class="clock-wrap">
    <span class="clock" id="liveClock">10:44</span>
  </div>
  <div class="top-info">
    <span class="date-str" id="dateStr">6月15日 周一</span>
    <span class="sep">|</span>
    <span class="weather-inline" id="weatherInline"><span class="loading">🌤️</span></span>
  </div>
  <div class="weather-detail" id="weatherDetail"></div>
</div>

<!-- ════ 竖屏主题条 ════ -->
<div class="theme-strip vert-only day-only" id="themeStrip"></div>

<div class="content-wrap day-only">
  <div class="section sched-panel">
    <div class="section-title">⏰ 今日作息</div>
    <div class="sched-list" id="scheduleList"></div>
  </div>
  <div class="section edu-panel">
    <div class="section-title" id="eduTitle">🎨 今日早教</div>
    <div id="eduList"></div>
  </div>
</div>

<div class="marquee-wrap" id="marqueeBar">
  <div class="marquee-bar">
    <span class="marquee-text" id="marqueeText">--</span>
  </div>
</div>

<div class="signature">请遵照执行，裴勇</div>

<script>
// ═══════════ 配置 ═══════════
const LAT = 31.878, LON = 117.265, CITY = "合肥·庐阳";
const WEEKDAYS = ["周日","周一","周二","周三","周四","周五","周六"];
const THEMES = [
  {emoji:"🌈",name:"颜色认知",tip:"多指认红色和黄色物品"},
  {emoji:"🐶",name:"动物世界",tip:"模仿叫声，看动物绘本"},
  {emoji:"🦶",name:"认识身体",tip:"指认五官，唱身体儿歌"},
  {emoji:"🎵",name:"音乐律动",tip:"敲节奏，跟着音乐摇摆"},
  {emoji:"🌿",name:"自然探索",tip:"观察树叶花朵，触摸不同材质"},
  {emoji:"🍽️",name:"生活技能",tip:"自己用勺子、收拾玩具"},
  {emoji:"❤️",name:"亲子互动",tip:"躲猫猫、拥抱、一起读绘本"},
];
const WCODE = {0:"☀️",1:"🌤️",2:"⛅",3:"☁️",45:"🌫️",48:"🌫️",51:"🌦️",53:"🌦️",55:"🌧️",61:"🌧️",63:"🌧️",65:"🌧️",71:"❄️",73:"❄️",75:"❄️",77:"❄️",80:"🌦️",81:"🌧️",82:"🌧️",85:"🌨️",86:"🌨️",95:"⛈️",96:"⛈️",99:"⛈️"};
const WDESC = {0:"晴",1:"少云",2:"多云",3:"阴",45:"雾",48:"雾凇",51:"小阵雨",53:"阵雨",55:"大阵雨",61:"小雨",63:"中雨",65:"大雨",71:"小雪",73:"中雪",75:"大雪",77:"雪粒",80:"小阵雨",81:"中阵雨",82:"大阵雨",85:"小雪",86:"中雪",95:"雷雨",96:"冰雹雷雨",99:"大冰雹"};

let weatherCache = null;

// ═══════════ 横屏时钟（HH MM SS 独立）═══════════
function updateWideClock() {
  var n = new Date();
  var elHh = document.getElementById("hh");
  var elMm = document.getElementById("mm");
  var elSs = document.getElementById("ss");
  if (elHh) elHh.textContent = String(n.getHours()).padStart(2, "0");
  if (elMm) elMm.textContent = String(n.getMinutes()).padStart(2, "0");
  if (elSs) elSs.textContent = String(n.getSeconds()).padStart(2, "0");
}

// ═══════════ 竖屏时钟 ═══════════
function updateVertClock() {
  var n = new Date();
  var el = document.getElementById("liveClock");
  var ds = document.getElementById("dateStr");
  if (el) el.textContent = String(n.getHours()).padStart(2,"0") + ":" + String(n.getMinutes()).padStart(2,"0");
  if (ds) ds.textContent = (n.getMonth()+1) + "月" + n.getDate() + "日 " + WEEKDAYS[n.getDay()];
}

// ═══════════ 天气 ═══════════
async function fetchWeather() {
  try {
    var d = new Date();
    var ds = d.toISOString().split("T")[0];
    var url = "https://api.open-meteo.com/v1/forecast?latitude="+LAT+"&longitude="+LON+"&daily=temperature_2m_max,temperature_2m_min,weathercode,precipitation_probability_max&current_weather=true&timezone=Asia/Shanghai&start_date="+ds+"&end_date="+ds;
    var res = await fetch(url);
    var data = await res.json();
    var dw = data.daily;
    var cw = data.current_weather || {};
    weatherCache = {
      max: dw.temperature_2m_max[0],
      min: dw.temperature_2m_min[0],
      code: dw.weathercode[0],
      rain: dw.precipitation_probability_max[0] || 0,
      now: cw.temperature !== undefined ? Math.round(cw.temperature) : null,
    };
  } catch(e) {
    weatherCache = {max:30,min:20,code:0,rain:0,now:25};
  }
  renderWeather();
  updateNightScreen();
}

function renderWeather() {
  var w = weatherCache || {max:30,min:20,code:0,rain:0,now:null};
  var icon = WCODE[w.code] || "☀️";
  var desc = WDESC[w.code] || "晴";
  var nowStr = (w.now !== null && w.now !== undefined) ? Math.round(w.now)+"° " : "";
  document.getElementById("weatherInline").innerHTML = 
    `${icon} ${nowStr}${Math.round(w.max)}° / ${Math.round(w.min)}°`;
  document.getElementById("weatherDetail").textContent = 
    `${desc} · 降水 ${w.rain}% · ${CITY}`;
  // 横屏天气栏
  var wi2 = document.getElementById("weatherInlineWide");
  if (wi2) wi2.innerHTML = `${icon} ${nowStr}${Math.round(w.max)}° / ${Math.round(w.min)}°`;
  // 宽屏 column5（竖屏横放顶部天气列）
  var c5 = document.getElementById("col5wx");
  if (c5) c5.innerHTML = `${icon}<br>${nowStr}${Math.round(w.max)}° / ${Math.round(w.min)}°`;
  // 旧版顶部横屏三元素兼容
  var wic = document.getElementById("wIcon");
  var wt = document.getElementById("wTemp");
  var ws = document.getElementById("wSub");
  if (wic) wic.textContent = icon;
  if (wt) wt.textContent = nowStr + Math.round(w.max) + "° / " + Math.round(w.min) + "°";
  if (ws) ws.textContent = CITY + " · " + desc + " · 💧" + w.rain + "%";
}

// ═══════════ 主题渲染 ═══════════
function getDayIdx() { return (new Date().getDay() + 6) % 7; } // 周一=0→颜色认知
function renderTheme() {
  var t = THEMES[getDayIdx() % 7];
  // 竖屏
  var ts = document.getElementById("themeStrip");

// ═══════════ 14:50 午睡闹铃 ═══════════
var alarmFired = false;
var alarmAudio = null;

function checkAlarm() {
  var n = new Date();
  var h = n.getHours(), m = n.getMinutes(), s = n.getSeconds();
  if (h === 14 && m === 50 && s >= 0 && s < 10 && !alarmFired) {
    alarmFired = true;
    showAlarm();
  }
  if (h === 0 && m === 0 && s < 5) alarmFired = false;
}

function beepAlarm(duration) {
  try {
    var ctx = new (window.AudioContext || window.webkitAudioContext)();
    var start = ctx.currentTime;
    var end = start + duration;
    var t = start;
    while (t < end) {
      // 短促哔声 200ms 开 + 200ms 关
      var osc = ctx.createOscillator();
      var gain = ctx.createGain();
      osc.type = "square";
      osc.frequency.value = 880;
      gain.gain.setValueAtTime(0.3, t);
      gain.gain.setValueAtTime(0, t + 0.18);
      gain.gain.setValueAtTime(0, t + 0.25);
      gain.gain.setValueAtTime(0.3, t + 0.25);
      gain.gain.setValueAtTime(0, t + 0.38);
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start(t);
      osc.stop(t + 0.4);
      t += 0.4;
    }
    alarmAudio = ctx;
  } catch(e) { /* iOS 自动播放限制，静默失败 */ }
}

function speakChinese(text, times, interval) {
  try {
    if (!window.speechSynthesis) return;
    function say(remaining) {
      if (remaining <= 0) return;
      var u = new SpeechSynthesisUtterance(text);
      u.lang = "zh-CN";
      u.rate = 0.85;
      u.pitch = 1.1;
      u.volume = 1;
      u.onend = function() { setTimeout(function(){ say(remaining - 1); }, interval); };
      speechSynthesis.speak(u);
    }
    say(times);
  } catch(e) { /* 不支持 TTS，静默跳过 */ }
}

function stopAlarm() {
  if (alarmAudio) { alarmAudio.close(); alarmAudio = null; }
  if (window.speechSynthesis) speechSynthesis.cancel();
}

function showAlarm() {
  var div = document.createElement("div");
  div.className = "alarm-overlay";
  div.innerHTML = '<span class="alarm-emoji">⏰</span><span class="alarm-title">宝宝该起床啦！</span><span class="alarm-sub">下午点心 · 温水 🍼</span><button class="alarm-btn" id="dismissBtn">知道了 👌</button>';
  
  function dismiss() {
    stopAlarm();
    if (div.parentElement) div.remove();
  }
  div.onclick = dismiss;
  document.body.appendChild(div);
  document.getElementById("dismissBtn").onclick = function(e){ e.stopPropagation(); dismiss(); };

  // 响铃 15 秒 + 语音三次
  beepAlarm(15);
  setTimeout(function(){ speakChinese("一苇 二杭起床了", 3, 2000); }, 300);

  // 30 秒后自动关闭
  setTimeout(function(){ dismiss(); }, 30000);
}

    {at:[21,20],text:"一苇、二杭 睡觉了", tag:"sleep"},    // 入睡前10分钟
  ];
  
  for (var i = 0; i < reminders.length; i++) {
    var r = reminders[i];
    if (h === r.at[0] && m === r.at[1] && s >= 0 && s < 10 && !remindFired[r.tag]) {

// ═══════════ 夜间模式检测 ═══════════
function qs(id){return document.getElementById(id);}
function checkNightMode(d) {
  d = d || new Date();
  var h = d.getHours();
  var isNight = (h >= 22 || h < 6);
  if (isNight) {
    document.body.classList.add("night-mode");
    document.body.classList.remove("day-mode");
  } else {
    document.body.classList.add("day-mode");
    document.body.classList.remove("night-mode");
    // 白天刷新夜间预热数据
    updateNightScreen();
  }
  return isNight;
}

// ═══════════ 更新夜间屏幕 ═══════════
function updateNightScreen() {
  var d = new Date();
  var h = d.getHours(), m = d.getMinutes();
  var ts = String(h).padStart(2,"0")+":"+String(m).padStart(2,"0");
  qs("#nightTime").textContent = ts;
  if (weatherCache && weatherCache.now !== null && weatherCache.now !== undefined) {
    qs("#nightTemp").innerHTML = weatherCache.now + "°";
  } else if (weatherCache) {
    // 没有实时温度时用最高最低的平均值
    var avg = Math.round((weatherCache.max + weatherCache.min) / 2);
    qs("#nightTemp").innerHTML = avg + "°";
  }
  if (weatherCache && weatherCache.code !== undefined) {
    qs("#nightWeatherLabel").textContent = WDESC[weatherCache.code] || "晴";
  }
}
